name: Deploy Dashboard (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "dashboard/**"
      - ".github/workflows/deploy_dashboard.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build static site
        run: |
          mkdir public
          cp -r dashboard/* public/
          for asset in public/*.js public/*.css; do
            if [ ! -f "$asset" ]; then
              continue
            fi
            base=$(basename "$asset")
            name="${base%.*}"
            ext="${base##*.}"
            hash=$(sha256sum "$asset" | cut -c1-12)
            new_name="${name}.${hash}.${ext}"
            mv "$asset" "public/${new_name}"
            for html in public/*.html; do
              sed -i "s|\\./${base}|./${new_name}|g" "$html"
            done
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
