<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>利用状況ログ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./usage-admin.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">Usage Monitoring</p>
          <h1>利用状況ログ</h1>
          <p class="subtitle">日次・月次のUU/PVとエラー発生状況を確認</p>
        </div>
        <div class="toolbar">
          <div class="control-group" role="group" aria-label="日次期間選択">
            <button class="period-btn is-active" data-days="30">30日</button>
            <button class="period-btn" data-days="90">90日</button>
          </div>
          <a class="nav-link-btn" href="./index.html">ダッシュボードへ戻る</a>
          <button id="reloadBtn" class="reload-btn">更新</button>
        </div>
      </header>

      <section class="usage-grid">
        <article class="panel">
          <div class="panel-heading">
            <h2>日次トレンド（UU / PV / 上位5ユーザーPV）</h2>
            <p id="dailyMeta" class="muted usage-meta"></p>
          </div>
          <div id="dailyTrendChart" class="chart chart-lg"></div>
        </article>
        <article class="panel">
          <div class="panel-heading">
            <h2>月次トレンド（UU / PV / 上位5ユーザーPV）</h2>
            <p id="monthlyMeta" class="muted usage-meta"></p>
          </div>
          <div id="monthlyTrendChart" class="chart chart-lg"></div>
        </article>
      </section>

      <section class="usage-grid">
        <article class="panel">
          <div class="panel-heading">
            <h2>エラー件数（日次）</h2>
            <p id="errorMeta" class="muted usage-meta"></p>
          </div>
          <div id="errorDailyChart" class="chart chart-sm"></div>
        </article>
        <article class="panel">
          <div class="panel-heading">
            <h2>最新エラー上位（直近7日）</h2>
            <p class="muted usage-meta">件数順（同率は最新時刻順）</p>
          </div>
          <div class="table-wrap">
            <table class="corr-table">
              <thead>
                <tr>
                  <th>順位</th>
                  <th>エラーコード</th>
                  <th>メッセージ要約</th>
                  <th>件数(7日)</th>
                  <th>最終発生(JST)</th>
                </tr>
              </thead>
              <tbody id="errorLatestBody"></tbody>
            </table>
          </div>
        </article>
      </section>

      <p id="statusMessage" class="status">読み込み中...</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="./config.js"></script>
    <script src="./usage-admin.js"></script>
  </body>
</html>
