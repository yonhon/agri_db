<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>沖縄市況ダッシュボード</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">Okinawa Market Monitor</p>
          <h1>沖縄市況ダッシュボード</h1>
          <p class="subtitle">本日の平均価格変化率とトレンドを1画面で確認</p>
        </div>
        <div class="toolbar">
          <div class="control-group" role="group" aria-label="期間選択">
            <button class="period-btn is-active" data-days="7">7日</button>
            <button class="period-btn" data-days="30">30日</button>
            <button class="period-btn" data-days="90">90日</button>
          </div>
          <button id="reloadBtn" class="reload-btn">更新</button>
        </div>
      </header>

      <section>
        <div class="panel-heading">
          <h2>KPI: 本日の平均価格変化率（前日比）</h2>
          <p id="kpiDateLabel" class="muted"></p>
        </div>
        <div id="kpiCards" class="kpi-grid"></div>
      </section>

      <section class="middle-grid">
        <article class="panel">
          <div class="panel-heading">
            <h2>品目別価格推移</h2>
            <p class="muted">複数選択可</p>
          </div>
          <label class="field-label" for="trendItems">表示品目</label>
          <select id="trendItems" class="field field-multi" multiple></select>
          <div id="trendChart" class="chart chart-mid"></div>
        </article>

        <article class="panel">
          <div class="panel-heading">
            <h2>入荷量 × 価格（2軸）</h2>
            <p class="muted">1品目を選択</p>
          </div>
          <label class="field-label" for="focusItem">対象品目</label>
          <select id="focusItem" class="field"></select>
          <div id="comboChart" class="chart chart-mid"></div>
        </article>
      </section>

      <section class="panel panel-full">
        <div class="panel-heading">
          <h2>品目比較ヒートマップ</h2>
          <p class="muted">色が濃いほど平均価格が高い</p>
        </div>
        <div id="heatmapChart" class="chart chart-lg"></div>
      </section>

      <p id="statusMessage" class="status">読み込み中...</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
